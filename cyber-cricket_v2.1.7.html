<div class="app">
<div class="screen active" id="screen-main"><div class="main-menu"><h1>暗黑角斗场</h1><div class="subtitle">Dark Arena</div><div class="version-tag">v2.1.7</div><div class="btn-col"><button class="btn" id="btn-start">开始游戏</button><button class="btn btn-online" id="btn-online">🌐 联机模式</button><button class="btn" id="btn-exit-menu">退出</button></div></div></div>
<div class="screen" id="screen-mode"><div class="mode-select"><h2>选择模式</h2><div class="btn-col"><button class="btn" id="btn-mode-1v1">1v1</button><button class="btn" id="btn-mode-1v1v1">1v1v1</button><button class="btn" id="btn-mode-2v2">2v2</button><button class="btn" id="btn-mode-back">退出</button></div></div></div>
<div class="screen" id="screen-select"><div class="player-select"><h2 id="select-title">选择斗士</h2><div class="select-layout"><div class="card-list" id="cardList"></div><div class="info-panel" id="infoPanel"><div class="placeholder">悬停或点击卡片<br>查看信息</div></div></div><div class="btn-row"><button class="btn" id="btn-battle-start" disabled>开始</button><button class="btn" id="btn-select-back">返回</button></div></div></div>
<div class="screen" id="screen-battle"><div class="battle-screen"><div class="canvas-wrap"><canvas id="battleCanvas" width="360" height="360"></canvas><button class="battle-settings-btn" id="battleSettingsBtn" title="设置">⚙</button></div><div class="battle-hint" id="battleHint">按 Esc 或点击 ⚙ 暂停</div></div></div>
<div class="screen" id="screen-match"><div class="match-screen"><h2>🌐 联机对战</h2><p class="desc">房主创建房间 → 把房间码告诉好友 → 好友输入加入</p><input class="relay-input" id="relayUrl" placeholder="中继地址（自动选择最优服务器）"><p style="font-size:10px;color:#a08830;margin:-4px 0 10px">⏳ 首次连接约需 30s 唤醒服务器</p><button class="btn btn-online" id="btn-create-room">🏠 创建房间</button><div id="createResult" style="display:none;margin-top:12px"><div class="badge-room"><div class="br-label">房间码 · 发给好友</div><div class="br-code" id="roomCodeShow"></div></div><p class="match-status dim" style="margin-top:8px">等待对手加入...</p></div><div class="sep"></div><input class="match-input" id="roomCodeInput" maxlength="6" placeholder="输入房间码"><button class="btn" id="btn-join-room" style="margin-top:10px">🚪 加入房间</button><button class="btn-ghost" id="btn-match-back" style="display:block;margin:14px auto">返回</button><p class="match-status" id="matchStatus"></p></div></div><div class="screen" id="screen-room"><div class="room-screen"><p class="rs-code">房间 <strong id="roomCodeDisplay"></strong></p><p class="rs-status" id="roomStatusHint">等待对手加入...</p><div class="role-badge" id="roleBadge" style="display:none"></div><div id="roomWait"><button class="btn btn-ready" id="btn-ready">⚡ 准备</button><p style="font-size:11px;color:#5a2828;margin-top:8px">双方准备后自动开始选角</p><button class="btn-ghost" id="btn-leave-room" style="margin-top:12px">🚪 退出房间</button></div><div id="roomPick" style="display:none"><div class="timer-bar-wrap"><div class="timer-bar" id="timerBar"></div></div><p class="turn-hint" id="turnHint"></p><div class="online-hero-grid" id="onlineHeroGrid"></div><p class="picks-bar" id="onlinePicksDisplay"></p><button class="btn" id="btn-confirm-pick" disabled style="margin-top:8px">确认选择</button></div></div></div>
<div class="pause-overlay" id="pauseOverlay"><div class="pause-dialog"><p>暂停</p><div class="btn-col" style="gap:10px"><button class="btn btn-sm" id="btn-pause-mainmenu">回到主界面</button><button class="btn btn-sm" id="btn-pause-select">返回选择</button><button class="btn btn-sm" id="btn-pause-cancel">取消</button></div></div></div>
<div class="gameover-overlay" id="gameoverOverlay"><div class="gameover-dialog" id="gameoverDialog"></div></div>
<div class="round-overlay" id="roundOverlay"><div class="round-dialog" id="roundDialog"></div></div>
<script>

var PD=[];
PD.push({id:'warrior',n:'刀盾',e:'🐕',sz:2.0,spd:4*A,mhp:600,d:15,an:'剑刃风暴',ad:'【剑刃风暴】每3秒朝敌人方向挥出150°扇形斩击（长98px），造成80点伤害，可摧毁飞行道具<br>【护盾】每10秒获得一个免疫任意一次伤害的护盾（金色光环标识）',sel:1,oc:function(t){t.hp=Math.max(0,t.hp-this.d);}});
